function Circ({pct,size=80,color="#22c55e"}){
  const r=(size-10)/2,c=2*Math.PI*r;
  return <svg width={size} height={size}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e293b" strokeWidth={6}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={6} strokeDasharray={c} strokeDashoffset={c*(1-pct/100)} strokeLinecap="round" transform={"rotate(-90 "+(size/2)+" "+(size/2)+")"} style={{transition:"stroke-dashoffset 0.8s"}}/><text x={size/2} y={size/2+5} textAnchor="middle" fill={color} style={{fontSize:size>70?14:11,fontWeight:700,fontFamily:"monospace"}}>{pct}%</text></svg>;
}

  return <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"#000c",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16,overflowY:"auto"}}>
    <div style={{background:"#0f172a",borderRadius:16,border:"1px solid #1e293b",padding:22,width:"100%",maxWidth:maxW}} onClick={e=>e.stopPropagation()}>
      {children}
    </div>
  </div>;
}

function Inp({value,onChange,placeholder,type="text",style={}}){
  return <input value={value} onChange={onChange} type={type} placeholder={placeholder}
    style={{width:"100%",background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:"8px 12px",color:"#f1f5f9",fontSize:13,...style}}/>;
}

function Sel({value,onChange,options,style={}}){
  return <select value={value} onChange={onChange}
    style={{width:"100%",background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:"8px 12px",color:"#f1f5f9",fontSize:13,...style}}>
    {options.map(o=><option key={o}>{o}</option>)}
  </select>;
}

function Field({label,children}){
  return <div style={{marginBottom:11}}>
    <div style={{fontSize:10,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>{label}</div>
    {children}
  </div>;
}

function Btn({onClick,children,style={},disabled=false}){
  return <button onClick={onClick} disabled={disabled}
    style={{border:"none",borderRadius:8,padding:"9px 16px",fontSize:13,fontWeight:600,cursor:disabled?"not-allowed":"pointer",...style}}>
    {children}
  </button>;
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("dashboard");
  const [plans,setPlans]=useState([DEFAULT_PLAN]);
  const [activePlanId,setActivePlanId]=useState(DEFAULT_PLAN.id);
  const [checked,setChecked]=useState(DEFAULT_CHECKED);
  const [habits,setHabits]=useState(DEFAULT_HABITS);
  const [habitsData,setHabitsData]=useState(DEFAULT_HABITS_DATA);
  const [energyLog,setEnergyLog]=useState({});
  const [combats,setCombats]=useState(DEFAULT_COMBATS);
  const [apiKey,setApiKey]=useState("");
  const [syncing,setSyncing]=useState(false);
  // UI state
  const [expWeek,setExpWeek]=useState(null);
  const [editMode,setEditMode]=useState(false);
  const [habitMonth,setHabitMonth]=useState(new Date().getMonth());
  const [habitYear,setHabitYear]=useState(new Date().getFullYear());
  const [habitView,setHabitView]=useState("month");
  // Modals
  const [showApiModal,setShowApiModal]=useState(false);
  const [showPlanSel,setShowPlanSel]=useState(false);
  const [showPlanModal,setShowPlanModal]=useState(null);
  const [showWeekModal,setShowWeekModal]=useState(null);
  const [showSesModal,setShowSesModal]=useState(null);
  const [showHabitConfig,setShowHabitConfig]=useState(false);
  const [showCombatForm,setShowCombatForm]=useState(false);
  const [showImport,setShowImport]=useState(false);
  const [importText,setImportText]=useState("");
  const [importLoading,setImportLoading]=useState(false);
  const [copyWeeks,setCopyWeeks]=useState(false);
  // Chat
  const [coachMsgs,setCoachMsgs]=useState([{role:"assistant",content:"Hola Vicente! Soy tu entrenador IA. Preguntame sobre BJJ, habitos, nutricion o cualquier duda."}]);
  const [coachIn,setCoachIn]=useState("");
  const [coachLoad,setCoachLoad]=useState(false);
  const [nutriMsgs,setNutriMsgs]=useState([{role:"assistant",content:"Hola! Soy tu nutricionista. Dime que tipo de dia es hoy y te recomiendo las mejores comidas."}]);
  const [nutriIn,setNutriIn]=useState("");
  const [nutriLoad,setNutriLoad]=useState(false);
  const coachRef=useRef(null);
  const nutriRef=useRef(null);
  const today=new Date();
  const todayKey=today.toISOString().split("T")[0];
  const activePlan=plans.find(p=>p.id===activePlanId)||plans[0];

  useEffect(()=>{coachRef.current&&coachRef.current.scrollIntoView({behavior:"smooth"});},[coachMsgs]);
  useEffect(()=>{nutriRef.current&&nutriRef.current.scrollIntoView({behavior:"smooth"});},[nutriMsgs]);

  // ── SUPABASE ──
  useEffect(()=>{
    const load=async()=>{
      setSyncing(true);
      try{
        const {data}=await sb.from("bjj_progress").select("*").eq("id","vicente").single();
        if(data){
          if(data.checked&&Object.keys(data.checked).length>0)setChecked(data.checked);
          if(data.plans&&data.plans.length>0)setPlans(data.plans);
          if(data.active_plan)setActivePlanId(data.active_plan);
          if(data.habits_data&&Object.keys(data.habits_data).length>0)setHabitsData(h=>({...DEFAULT_HABITS_DATA,...data.habits_data}));
          if(data.habits_list&&data.habits_list.length>0)setHabits(data.habits_list);
          if(data.energy_log)setEnergyLog(data.energy_log);
          if(data.combats&&data.combats.length>0)setCombats(data.combats);
          if(data.api_key)setApiKey(data.api_key);
        }
      }catch(e){console.log("load",e);}
      setSyncing(false);
    };
    load();
    const ch=sb.channel("vhq").on("postgres_changes",{event:"UPDATE",schema:"public",table:"bjj_progress",filter:"id=eq.vicente"},p=>{
      if(p.new){
        if(p.new.checked&&Object.keys(p.new.checked).length>0)setChecked(p.new.checked);
        if(p.new.plans&&p.new.plans.length>0)setPlans(p.new.plans);
        if(p.new.active_plan)setActivePlanId(p.new.active_plan);
        if(p.new.habits_data&&Object.keys(p.new.habits_data).length>0)setHabitsData(h=>({...h,...p.new.habits_data}));
        if(p.new.energy_log)setEnergyLog(p.new.energy_log);
        if(p.new.combats&&p.new.combats.length>0)setCombats(p.new.combats);
      }
    }).subscribe();
    return()=>sb.removeChannel(ch);
  },[]);

  const saveTimer=useRef(null);
  const save=useCallback((nc,np,nap,nhd,nh,nel,ncb,nak)=>{
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      setSyncing(true);
      try{
        await sb.from("bjj_progress").upsert({
          id:"vicente",checked:nc,plans:np,active_plan:nap,
          habits_data:nhd,habits_list:nh,energy_log:nel,combats:ncb,
          api_key:nak||null,updated_at:new Date().toISOString()
        });
      }catch(e){console.log("save",e);}
      setSyncing(false);
    },800);
  },[]);

  const S=(nc=checked,np=plans,nap=activePlanId,nhd=habitsData,nh=habits,nel=energyLog,ncb=combats,nak=apiKey)=>
    save(nc,np,nap,nhd,nh,nel,ncb,nak);

  // BJJ helpers
  const totS=activePlan.weeks.reduce((a,w)=>a+w.sessions.length,0);
  const totD=activePlan.weeks.reduce((a,w)=>a+w.sessions.filter(s=>checked[activePlan.id+"_"+s.id]).length,0);
  const totP=totS?Math.round(totD/totS*100):0;
  const wPct=w=>{const t=w.sessions.length,d=w.sessions.filter(s=>checked[activePlan.id+"_"+s.id]).length;return t?Math.round(d/t*100):0;};
  const ck=sid=>!!checked[activePlan.id+"_"+sid];
  const toggleCk=sid=>{const n={...checked,[activePlan.id+"_"+sid]:!checked[activePlan.id+"_"+sid]};setChecked(n);S(n);};

  // Habits helpers
  const getDays=(y,m)=>new Date(y,m+1,0).getDate();
  const mKey=(y,m)=>y+"-"+m;
  const getMD=()=>{
    const k=mKey(habitYear,habitMonth);
    if(!habitsData[k]){const e={};habits.forEach(h=>{e[h.id]=Array(31).fill(null);});return e;}
    return habitsData[k];
  };
  const toggleH=(hid,day)=>{
    const k=mKey(habitYear,habitMonth);
    const md={...getMD()};const arr=[...(md[hid]||Array(31).fill(null))];
    arr[day]=arr[day]===1?0:arr[day]===0?null:1;
    md[hid]=arr;const nhd={...habitsData,[k]:md};
    setHabitsData(nhd);S(checked,plans,activePlanId,nhd);
    const btn=document.getElementById("hc-"+hid+"-"+day);
    if(btn){btn.classList.add("pop");setTimeout(()=>btn.classList.remove("pop"),300);}
  };
  window._th=toggleH;
  const hStats=hid=>{const md=getMD();const days=getDays(habitYear,habitMonth);const arr=md[hid]||[];let done=0,tot=0;for(let i=0;i<days;i++){if(arr[i]!==null&&arr[i]!==undefined){tot++;if(arr[i]===1)done++;}}return{done,tot,pct:tot?Math.round(done/tot*100):0};};
  const dScore=d=>{const md=getMD();return habits.reduce((a,h)=>a+((md[h.id]||[])[d]===1?1:0),0);};
  const totChecks=()=>habits.reduce((a,h)=>a+hStats(h.id).done,0);
  const perfectDays=()=>{const d=getDays(habitYear,habitMonth);let c=0;for(let i=0;i<d;i++)if(dScore(i)===habits.length)c++;return c;};
  const overallPct=()=>Math.round(totChecks()/(habits.length*getDays(habitYear,habitMonth))*100);
  const sColor=s=>{if(s===habits.length)return"#10b981";if(s>=7)return"#8b5cf6";if(s>=4)return"#f97316";if(s>=1)return"#ef4444";return"#1e293b";};
  const todayHScore=dScore(today.getDate()-1);

  // Plan ops
  const savePlan=form=>{
    let np;
    if(plans.find(p=>p.id===form.id)){np=plans.map(p=>p.id===form.id?{...p,name:form.name,compDate:form.compDate,compGoal:form.compGoal}:p);}
    else{
      let weeks=[];
      if(copyWeeks&&activePlan)weeks=activePlan.weeks.map(w=>({...w,id:"w_"+uid(),sessions:w.sessions.map(s=>({...s,id:"s_"+uid()}))}));
      np=[...plans,{...form,id:"plan_"+uid(),weeks,createdAt:new Date().toISOString()}];
      setActivePlanId(np[np.length-1].id);
    }
    setPlans(np);S(checked,np);setShowPlanModal(null);
  };
  const saveWeek=form=>{
    const np=plans.map(p=>{if(p.id!==activePlanId)return p;const ex=p.weeks.find(w=>w.id===form.id);return{...p,weeks:ex?p.weeks.map(w=>w.id===form.id?{...w,...form}:w):[...p.weeks,form]};});
    setPlans(np);S(checked,np);setShowWeekModal(null);
  };
  const saveSes=(weekId,form)=>{
    const np=plans.map(p=>{if(p.id!==activePlanId)return p;return{...p,weeks:p.weeks.map(w=>{if(w.id!==weekId)return w;const ex=w.sessions.find(s=>s.id===form.id);return{...w,sessions:ex?w.sessions.map(s=>s.id===form.id?form:s):[...w.sessions,form]};})};});
    setPlans(np);S(checked,np);setShowSesModal(null);
  };
  const delSes=(weekId,sid)=>{if(!confirm("Eliminar sesion?"))return;const np=plans.map(p=>p.id!==activePlanId?p:{...p,weeks:p.weeks.map(w=>w.id!==weekId?w:{...w,sessions:w.sessions.filter(s=>s.id!==sid)})});setPlans(np);S(checked,np);};
  const delWeek=wid=>{if(!confirm("Eliminar semana?"))return;const np=plans.map(p=>p.id!==activePlanId?p:{...p,weeks:p.weeks.filter(w=>w.id!==wid)});setPlans(np);S(checked,np);};

  // AI
  const callAI=async(system,msgs,setMsgs,setLoad)=>{
    setLoad(true);
    if(!apiKey){setMsgs(m=>[...m,{role:"assistant",content:"Configura tu API key de Claude en el boton Config IA del header."}]);setLoad(false);return;}
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        headers:{"Content-Type":"application/json","anthropic-dangerous-allow-browser":"true","x-api-key":apiKey},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,system,messages:msgs.map(m=>({role:m.role,content:m.content}))})});
      const d=await r.json();
      setMsgs(m=>[...m,{role:"assistant",content:d.content?.[0]?.text||(d.error?"Error: "+d.error.message:"Error.")}]);
    }catch(e){setMsgs(m=>[...m,{role:"assistant",content:"Error: "+e.message}]);}
    setLoad(false);
  };
  const sendCoach=()=>{
    if(!coachIn.trim()||coachLoad)return;
    const u=coachIn.trim();setCoachIn("");
    const nm=[...coachMsgs,{role:"user",content:u}];setCoachMsgs(nm);
    callAI(`Eres el entrenador personal de Vicente, 44 anos, BJJ competidor, CEO, 80kg. BJJ: ${totP}% (${totD}/${totS}). Habitos: ${overallPct()}%. Combates: ${combats.length} (${combats.filter(c=>c.result==="victoria").length} victorias). Espanol, max 120 palabras.`,nm,setCoachMsgs,setCoachLoad);
  };
  const sendNutri=()=>{
    if(!nutriIn.trim()||nutriLoad)return;
    const u=nutriIn.trim();setNutriIn("");
    const nm=[...nutriMsgs,{role:"user",content:u}];setNutriMsgs(nm);
    callAI("Eres el nutricionista de Vicente, atleta BJJ 44 anos, 80kg. Recomendaciones concretas con cantidades. Espanol, max 150 palabras.",nm,setNutriMsgs,setNutriLoad);
  };

  // Import plan from text
  const genPlan=async()=>{
    if(!importText.trim())return;
    if(!apiKey){alert("Necesitas API key de Claude.");return;}
    setImportLoading(true);
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        headers:{"Content-Type":"application/json","anthropic-dangerous-allow-browser":"true","x-api-key":apiKey},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,
          system:`Convierte texto de plan BJJ en JSON. Solo JSON valido sin markdown:
{"name":"nombre","compDate":"YYYY-MM-DD","compGoal":"objetivo","weeks":[{"label":"SEMANA 1","dates":"fechas","fase":"descripcion","color":"#1a3a6b","sessions":[{"type":"BJJ","name":"nombre","dur":"90'","intensity":"Media","desc":"descripcion"}]}]}`,
          messages:[{role:"user",content:"Convierte en JSON:\n\n"+importText}]})});
      const d=await r.json();
      const txt=d.content?.[0]?.text||"";
      const parsed=JSON.parse(txt.replace(/```json|```/g,"").trim());
      const newPlan={...parsed,id:"plan_"+uid(),createdAt:new Date().toISOString(),
        weeks:(parsed.weeks||[]).map(w=>({...w,id:"w_"+uid(),sessions:(w.sessions||[]).map(s=>({...s,id:"s_"+uid()}))}))};
      const np=[...plans,newPlan];setPlans(np);setActivePlanId(newPlan.id);
      S(checked,np,newPlan.id);setShowImport(false);setImportText("");
      alert("Plan creado: "+newPlan.name+" con "+newPlan.weeks.length+" semanas");
    }catch(e){alert("Error: "+e.message);}
    setImportLoading(false);
  };

  const daysToComp=activePlan.compDate?Math.ceil((new Date(activePlan.compDate)-today)/86400000):null;
  const inp={background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:"8px 12px",color:"#f1f5f9",fontSize:13,width:"100%",fontFamily:"inherit"};

  const ChatPanel=({msgs,input,setInput,onSend,loading,endRef,sugs,placeholder,color,label})=>(
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 270px)",minHeight:340,background:"#0a0f1e",borderRadius:14,border:"1px solid #1e293b",overflow:"hidden"}}>
      <div style={{flex:1,overflowY:"auto",padding:14,display:"flex",flexDirection:"column",gap:9,WebkitOverflowScrolling:"touch"}}>
        {msgs.map((m,i)=>(
          <div key={i} style={m.role==="user"?{alignSelf:"flex-end",background:"linear-gradient(135deg,#166534,#15803d)",color:"#fff",padding:"9px 12px",borderRadius:"14px 14px 4px 14px",maxWidth:"78%",fontSize:12,lineHeight:1.5}:{alignSelf:"flex-start",background:"#1e293b",border:"1px solid #334155",color:"#e2e8f0",padding:"10px 12px",borderRadius:"4px 14px 14px 14px",maxWidth:"84%",fontSize:12,lineHeight:1.6}}>
            {m.role==="assistant"&&<div style={{fontSize:9,color,fontWeight:700,marginBottom:3}}>{label}</div>}
            <div style={{whiteSpace:"pre-wrap"}}>{m.content}</div>
          </div>
        ))}
        {loading&&<div style={{alignSelf:"flex-start",background:"#1e293b",padding:"10px 12px",borderRadius:"4px 14px 14px 14px",color:"#475569",fontSize:12}}>Analizando...</div>}
        <div ref={endRef}/>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5,padding:"0 12px 7px"}}>
        {sugs.map((s,i)=><button key={i} onClick={()=>setInput(s)} style={{background:"#0f172a",border:"1px solid #1e293b",color:"#64748b",fontSize:10,padding:"3px 8px",borderRadius:16,cursor:"pointer"}}>{s}</button>)}
      </div>
      <div style={{display:"flex",gap:7,padding:"9px 12px",borderTop:"1px solid #1e293b",background:"#030712"}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&onSend()} placeholder={placeholder}
          style={{flex:1,background:"#0f172a",border:"1px solid #1e293b",borderRadius:9,padding:"8px 11px",color:"#f1f5f9",fontSize:12,outline:"none",fontFamily:"inherit"}}/>
        <button onClick={onSend} disabled={loading} style={{background:loading?"#1e293b":"linear-gradient(135deg,#16a34a,#15803d)",color:"#fff",border:"none",borderRadius:9,padding:"8px 14px",fontSize:12,fontWeight:600,cursor:loading?"not-allowed":"pointer"}}>
          {loading?"...":"Enviar"}
        </button>
      </div>
    </div>
  );

  const TABS=[["dashboard","🏠","INICIO"],["bjj","🥋","BJJ"],["habitos","✅","HÁBITOS"],["combates","🏆","COMBATES"],["nutri","🥗","NUTRICIÓN"],["coach","🤖","COACH IA"]];

  return(
    <div style={{minHeight:"100vh",background:"#030712",color:"#e2e8f0",fontFamily:"'Segoe UI',system-ui,sans-serif"}}>

      {/* ── MODALS ── */}
      {showApiModal&&(
        <Modal onClose={()=>setShowApiModal(false)}>
          <div style={{fontSize:14,fontWeight:700,color:"#f1f5f9",marginBottom:8}}>API Key de Claude</div>
          <div style={{fontSize:11,color:"#64748b",marginBottom:14,lineHeight:1.5}}>console.anthropic.com · Se guarda en Supabase y sincroniza entre dispositivos</div>
          <Field label="API Key"><input value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-api03-..." style={{...inp,fontFamily:"monospace"}}/></Field>
          <div style={{display:"flex",gap:8}}>
            <Btn onClick={()=>setShowApiModal(false)} style={{flex:1,background:"#1e293b",color:"#94a3b8"}}>Cancelar</Btn>
            <Btn onClick={()=>{S(checked,plans,activePlanId,habitsData,habits,energyLog,combats,apiKey);setShowApiModal(false);}} style={{flex:2,background:"linear-gradient(135deg,#7c3aed,#4f46e5)",color:"#fff"}}>Guardar</Btn>
          </div>
        </Modal>
      )}

      {showPlanSel&&(
        <Modal onClose={()=>setShowPlanSel(false)}>
          <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",marginBottom:12}}>Planes</div>
          {plans.map(p=>(
            <div key={p.id} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 11px",borderRadius:9,background:p.id===activePlanId?"#1e293b":"transparent",marginBottom:5,cursor:"pointer"}} onClick={()=>{setActivePlanId(p.id);S(checked,plans,p.id);setShowPlanSel(false);}}>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:p.id===activePlanId?"#22c55e":"#e2e8f0"}}>{p.name}</div><div style={{fontSize:10,color:"#64748b"}}>{p.compDate||"Sin fecha"} · {p.compGoal}</div></div>
              <button onClick={e=>{e.stopPropagation();setShowPlanModal(p);setCopyWeeks(false);setShowPlanSel(false);}} style={{background:"#334155",border:"none",color:"#94a3b8",borderRadius:5,padding:"3px 7px",cursor:"pointer",fontSize:11}}>Ed</button>
              {plans.length>1&&<button onClick={e=>{e.stopPropagation();if(!confirm("Eliminar?"))return;const np=plans.filter(x=>x.id!==p.id);setPlans(np);if(activePlanId===p.id)setActivePlanId(np[0].id);S(checked,np,np[0].id);}} style={{background:"#2d0a0a",border:"none",color:"#f87171",borderRadius:5,padding:"3px 7px",cursor:"pointer",fontSize:11}}>X</button>}
            </div>
          ))}
          <Btn onClick={()=>{setShowPlanModal({});setCopyWeeks(false);setShowPlanSel(false);}} style={{width:"100%",background:"linear-gradient(135deg,#7c3aed,#4f46e5)",color:"#fff",marginTop:8}}>+ Nuevo plan</Btn>
        </Modal>
      )}

      {showPlanModal!==null&&(()=>{
        const isNew=!showPlanModal.id;
        const [f,setF]=useState(isNew?{name:"",compDate:"",compGoal:""}:{name:showPlanModal.name,compDate:showPlanModal.compDate||"",compGoal:showPlanModal.compGoal||""});
        return <Modal onClose={()=>setShowPlanModal(null)}>
          <div style={{fontSize:14,fontWeight:700,color:"#f1f5f9",marginBottom:14}}>{isNew?"Nuevo plan":"Editar plan"}</div>
          <Field label="Nombre"><input value={f.name} onChange={e=>setF(x=>({...x,name:e.target.value}))} style={inp}/></Field>
          <Field label="Fecha competicion"><input type="date" value={f.compDate} onChange={e=>setF(x=>({...x,compDate:e.target.value}))} style={inp}/></Field>
          <Field label="Objetivo"><input value={f.compGoal} onChange={e=>setF(x=>({...x,compGoal:e.target.value}))} style={inp}/></Field>
          {isNew&&<div onClick={()=>setCopyWeeks(v=>!v)} style={{display:"flex",alignItems:"center",gap:9,background:copyWeeks?"#052e16":"#0f172a",border:"1px solid "+(copyWeeks?"#22c55e40":"#1e293b"),borderRadius:9,padding:"9px 12px",cursor:"pointer",marginBottom:12}}>

            <div style={{fontSize:12,color:copyWeeks?"#22c55e":"#94a3b8"}}>Copiar semanas del plan actual ({activePlan.weeks.length} semanas)</div>
          </div>}
          <div style={{display:"flex",gap:8}}>
            <Btn onClick={()=>setShowPlanModal(null)} style={{flex:1,background:"#1e293b",color:"#94a3b8"}}>Cancelar</Btn>
            <Btn onClick={()=>savePlan({...showPlanModal,...f})} style={{flex:2,background:"linear-gradient(135deg,#7c3aed,#4f46e5)",color:"#fff"}}>Guardar</Btn>
          </div>
        </Modal>;
      })()}

                return <div key={type} style={{background:"#0f172a",border:"1px solid "+cfg.c+"22",borderRadius:8,padding:"8px",textAlign:"center"}}>
                  <div style={{fontSize:15,fontWeight:800,color:cfg.c}}>{t?Math.round(d/t*100):0}%</div>
                  <div style={{fontSize:8,color:"#64748b",textTransform:"uppercase",marginTop:1}}>{type}</div>
                </div>;
              })}
              <div style={{background:"#0f172a",border:"1px solid #f59e0b22",borderRadius:8,padding:"8px",textAlign:"center"}}>
                <div style={{fontSize:15,fontWeight:800,color:"#f59e0b"}}>{totD}/{totS}</div>
                <div style={{fontSize:8,color:"#64748b",textTransform:"uppercase",marginTop:1}}>Total</div>
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:7}}>
              <button onClick={()=>setShowPlanSel(true)} style={{background:"#1e293b",border:"1px solid #334155",color:"#94a3b8",borderRadius:7,padding:"5px 10px",cursor:"pointer",fontSize:11}}>{activePlan.name} ▾</button>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                <button onClick={()=>setEditMode(e=>!e)} style={{background:editMode?"#16a34a20":"#1e293b",border:"1px solid "+(editMode?"#22c55e":"#334155"),color:editMode?"#22c55e":"#64748b",borderRadius:7,padding:"5px 9px",cursor:"pointer",fontSize:10,fontWeight:600}}>{editMode?"✓ Editando":"Editar"}</button>
                {editMode&&<button onClick={()=>setShowWeekModal({})} style={{background:"linear-gradient(135deg,#1a3a6b,#1e40af)",border:"none",color:"#fff",borderRadius:7,padding:"5px 9px",cursor:"pointer",fontSize:10,fontWeight:600}}>+ Semana</button>}
                <button onClick={()=>setShowImport(true)} style={{background:"linear-gradient(135deg,#059669,#047857)",border:"none",color:"#fff",borderRadius:7,padding:"5px 9px",cursor:"pointer",fontSize:10,fontWeight:600}}>✨ Importar IA</button>
              </div>
            </div>
            {activePlan.weeks.map(week=>{
              const pct=wPct(week),exp=expWeek===week.id;
              return <div key={week.id} style={{background:"#0a0f1e",border:"1px solid "+(exp?week.color+"80":"#1e293b"),borderRadius:12,marginBottom:8,overflow:"hidden"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 14px",cursor:"pointer",background:"linear-gradient(135deg,"+week.color+"12,transparent)"}} onClick={()=>setExpWeek(exp?null:week.id)}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                      <span style={{fontSize:13,fontWeight:700,color:"#f1f5f9"}}>{week.label}</span>
                      <span style={{fontSize:9,color:"#64748b"}}>{week.dates}</span>
                      <span style={{fontSize:9,background:week.color+"20",color:week.color,padding:"2px 7px",borderRadius:20,fontWeight:700}}>{pct}%</span>
                    </div>
                    <div style={{fontSize:9,color:"#64748b",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{week.fase}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:7,flexShrink:0,marginLeft:8}}>
                    {editMode&&<div style={{display:"flex",gap:3}} onClick={e=>e.stopPropagation()}>
                      <button onClick={()=>setShowWeekModal(week)} style={{background:"#1e293b",border:"none",color:"#64748b",width:24,height:24,borderRadius:5,cursor:"pointer",fontSize:9}}>Ed</button>
                      <button onClick={()=>delWeek(week.id)} style={{background:"#2d0a0a",border:"none",color:"#f87171",width:24,height:24,borderRadius:5,cursor:"pointer",fontSize:9}}>X</button>
                    </div>}
                    <div style={{width:48,height:4,background:"#1e293b",borderRadius:3,overflow:"hidden"}}><div style={{width:pct+"%",height:"100%",background:week.color,borderRadius:3}}/></div>
                    <span style={{color:"#475569",fontSize:11}}>{exp?"▲":"▼"}</span>
                  </div>
                </div>
                {exp&&<div>
                  {week.sessions.map(s=>{
                    const done=ck(s.id);
                    return <div key={s.id} style={{padding:"8px 14px",borderTop:"1px solid #0a0f1e",background:done?"#052e1615":"transparent",display:"flex",alignItems:"flex-start",gap:7}}>
                      <button onClick={()=>toggleCk(s.id)} style={{width:23,height:23,borderRadius:5,border:"2px solid "+(done?"#22c55e":"#334155"),background:done?"#22c55e15":"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#22c55e",flexShrink:0,marginTop:1}}>{done?"✓":""}</button>
                      <div style={{background:TC[s.type]?.b,color:TC[s.type]?.c,fontSize:8,fontWeight:700,padding:"2px 5px",borderRadius:4,flexShrink:0,marginTop:2}}>{s.type}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                          <span style={{fontSize:12,fontWeight:600,color:done?"#475569":"#e2e8f0",textDecoration:done?"line-through":"none"}}>{s.name}</span>
                          <span style={{fontSize:10,color:"#22c55e",fontWeight:700}}>{s.dur}</span>
                          <span style={{fontSize:9,color:IC[s.intensity]||"#94a3b8",fontWeight:600}}>{s.intensity}</span>
                        </div>
                        <div style={{fontSize:9,color:"#475569",marginTop:1,lineHeight:1.4}}>{s.desc}</div>
                      </div>
                      {editMode&&<div style={{display:"flex",gap:3,flexShrink:0}}>
                        <button onClick={()=>setShowSesModal({weekId:week.id,ses:s})} style={{background:"#1e293b",border:"none",color:"#64748b",width:22,height:22,borderRadius:4,cursor:"pointer",fontSize:9}}>Ed</button>
                        <button onClick={()=>delSes(week.id,s.id)} style={{background:"#2d0a0a",border:"none",color:"#f87171",width:22,height:22,borderRadius:4,cursor:"pointer",fontSize:9}}>X</button>
                      </div>}
                    </div>;
                  })}
                  {editMode&&<div style={{padding:"8px 14px",borderTop:"1px solid #0a0f1e"}}>
                    <button onClick={()=>setShowSesModal({weekId:week.id,ses:null})} style={{width:"100%",background:"#052e16",border:"1px dashed #22c55e30",color:"#22c55e",borderRadius:7,padding:"6px",cursor:"pointer",fontSize:11,fontWeight:600}}>+ Añadir sesion</button>
                  </div>}
                </div>}
              </div>;
            })}
          </div>
        )}

        {/* ── HABITOS ── */}
        {tab==="habitos"&&(
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <button onClick={()=>{if(habitMonth===0){setHabitMonth(11);setHabitYear(y=>y-1);}else setHabitMonth(m=>m-1);}} style={{background:"#1e293b",border:"1px solid #334155",color:"#94a3b8",borderRadius:7,padding:"5px 10px",cursor:"pointer",fontSize:16}}>‹</button>
                <div style={{fontSize:17,fontWeight:800,minWidth:155,textAlign:"center"}}>{MONTHS[habitMonth]} <span style={{color:"#64748b",fontWeight:400,fontSize:14}}>{habitYear}</span></div>
                <button onClick={()=>{if(habitMonth===11){setHabitMonth(0);setHabitYear(y=>y+1);}else setHabitMonth(m=>m+1);}} style={{background:"#1e293b",border:"1px solid #334155",color:"#94a3b8",borderRadius:7,padding:"5px 10px",cursor:"pointer",fontSize:16}}>›</button>
              </div>
              <div style={{display:"flex",gap:7,alignItems:"center"}}>
                <button onClick={()=>setShowHabitConfig(true)} style={{background:"#1e293b",border:"1px solid #334155",color:"#8b5cf6",borderRadius:7,padding:"5px 9px",cursor:"pointer",fontSize:10,fontWeight:600}}>⚙️ Configurar</button>
                {[["month","📅 Mes"],["stats","📊 Stats"]].map(([k,l])=>(
                  <button key={k} onClick={()=>setHabitView(k)} style={{padding:"5px 12px",borderRadius:18,border:"1px solid "+(habitView===k?"#22c55e":"#1e293b"),background:habitView===k?"#052e16":"transparent",color:habitView===k?"#22c55e":"#475569",fontSize:11,fontWeight:600,cursor:"pointer"}}>{l}</button>
                ))}
              </div>
              <div style={{display:"flex",gap:12}}>
                {[{v:overallPct()+"%",l:"Progreso",c:"#8b5cf6"},{v:totChecks(),l:"Checks",c:"#10b981"},{v:perfectDays(),l:"Perfectos",c:"#f97316"}].map((k,i)=>(
                  <div key={i} style={{textAlign:"center"}}><div style={{fontSize:18,fontWeight:900,color:k.c}}>{k.v}</div><div style={{fontSize:9,color:"#64748b"}}>{k.l}</div></div>
                ))}
              </div>
            </div>

            {habitView==="month"&&(()=>{
              const days=getDays(habitYear,habitMonth);
              const todayDay=(today.getFullYear()===habitYear&&today.getMonth()===habitMonth)?today.getDate()-1:-1;
              const md=getMD();
              let tableHtml="<thead><tr><th style='padding:0 8px 8px;font-size:10px;color:#475569;font-weight:600;text-align:left;width:200px'>HÁBITO</th>";
              for(let i=1;i<=days;i++)tableHtml+=`<th style='padding:0 1px 8px;font-size:9px;color:${i-1===todayDay?"#f97316":"#475569"};font-weight:${i-1===todayDay?700:400};text-align:center'>${i}</th>`;
              tableHtml+="<th style='padding:0 7px 8px;font-size:10px;color:#475569;font-weight:600;width:42px'>%</th><th style='padding:0 4px 8px;font-size:10px;color:#475569;font-weight:600;width:38px'>Pts</th></tr></thead><tbody>";
              habits.forEach(h=>{
                const{done,pct:hp}=hStats(h.id);const arr=md[h.id]||Array(31).fill(null);const col=CAT_COLOR[h.category]||"#94a3b8";
                const pCol=hp>=80?"#10b981":hp>=50?"#f97316":"#ef4444";
                tableHtml+=`<tr><td style='padding:2px 8px;white-space:nowrap'><div style='display:flex;align-items:center;gap:7px'><span style='font-size:14px'>${h.icon}</span><div><div style='font-size:11px;font-weight:600;color:#cbd5e1'>${h.name}</div><div style='height:2px;border-radius:1px;margin-top:2px;width:${hp}%;background:${col};min-width:2px'></div></div></div></td>`;
                for(let d=0;d<days;d++){const val=arr[d];const cls=val===1?"done":val===0?"fail":"empty";const tc=d===todayDay?" today-col":"";tableHtml+=`<td style='padding:2px 1px;text-align:center'><button id='hc-${h.id}-${d}' class='cell-btn ${cls}${tc}' onclick='window._th(${h.id},${d})'>${val===1?"✓":val===0?"✗":""}</button></td>`;}
                tableHtml+=`<td style='padding:2px 7px;text-align:center'><span style='font-size:11px;font-weight:700;color:${pCol}'>${hp}%</span></td><td style='padding:2px 4px;text-align:center'><span style='font-size:11px;font-weight:700;color:#8b5cf6'>${done}</span></td></tr>`;
              });
              tableHtml+="<tr style='border-top:1px solid #1e293b'><td style='padding:7px 8px;font-size:10px;color:#64748b;font-weight:600'>Puntos del dia</td>";
              for(let d=0;d<days;d++){const s=dScore(d);const bg=s===0?"transparent":sColor(s);const tc=s===0?"#334155":"white";const gl=s===habits.length?"box-shadow:0 0 9px rgba(16,185,129,0.5);":"";tableHtml+=`<td style='padding:7px 1px 4px;text-align:center'><div style='width:23px;height:23px;border-radius:5px;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:${bg};color:${tc};${s===0?"border:1px solid #1e293b":""};${gl}'>${s>0?s:""}</div></td>`;}
              tableHtml+="<td colspan='2'></td></tr></tbody>";
              return <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
                <table style={{borderCollapse:"collapse",width:"100%",minWidth:800}} dangerouslySetInnerHTML={{__html:tableHtml}}/>
                <div style={{display:"flex",gap:12,marginTop:10,flexWrap:"wrap",padding:"0 4px"}}>
                  {[{bg:"linear-gradient(135deg,#10b981,#059669)",l:"Hecho"},{bg:"linear-gradient(135deg,#ef4444,#dc2626)",l:"No hecho"},{bg:"#1e293b",l:"Pendiente",brd:"1px solid #334155"}].map((k,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:14,height:14,borderRadius:3,background:k.bg,border:k.brd}}/><span style={{fontSize:10,color:"#64748b"}}>{k.l}</span></div>
                  ))}
                  <span style={{marginLeft:"auto",fontSize:10,color:"#475569",fontFamily:"monospace"}}>Click: hecho → no hecho → pendiente</span>
                </div>
              </div>;
            })()}

            {habitView==="stats"&&(
              <div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10,marginBottom:14}}>
                  {[{l:"Progreso total",v:overallPct()+"%",s:"del mes",c:"#8b5cf6",i:"📈"},{l:"Checks totales",v:totChecks(),s:"de "+(habits.length*getDays(habitYear,habitMonth))+" posibles",c:"#10b981",i:"✅"},{l:"Dias perfectos",v:perfectDays(),s:"todos los habitos",c:"#f97316",i:"🔥"},{l:"Habitos activos",v:habits.length,s:"en seguimiento",c:"#06b6d4",i:"🎯"}].map((k,i)=>(
                    <div key={i} style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:12,padding:14}}>
                      <div style={{fontSize:20,marginBottom:5}}>{k.i}</div>
                      <div style={{fontSize:26,fontWeight:900,color:k.c}}>{k.v}</div>
                      <div style={{fontSize:11,fontWeight:600,color:"#94a3b8",marginTop:3}}>{k.l}</div>
                      <div style={{fontSize:10,color:"#64748b"}}>{k.s}</div>
                    </div>
                  ))}
                </div>
                <div style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:13,padding:14,marginBottom:12}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#94a3b8",marginBottom:12,letterSpacing:1,textTransform:"uppercase"}}>Rendimiento por habito</div>
                  {habits.map(h=>{const{done,tot,pct:hp}=hStats(h.id);const col=CAT_COLOR[h.category]||"#94a3b8";const pCol=hp>=80?"#10b981":hp>=50?"#f97316":"#ef4444";return <div key={h.id} style={{marginBottom:11}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:14}}>{h.icon}</span><span style={{fontSize:12,fontWeight:600,color:"#cbd5e1"}}>{h.name}</span><span style={{fontSize:9,padding:"2px 5px",borderRadius:4,fontWeight:600,background:col+"22",color:col}}>{h.category}</span></div>
                      <div style={{fontSize:12,fontWeight:700,color:pCol}}>{hp}% <span style={{color:"#475569",fontWeight:400,fontSize:10}}>({done}/{tot})</span></div>
                    </div>
                    <div style={{background:"#1e293b",borderRadius:4,height:6}}><div style={{width:hp+"%",height:"100%",borderRadius:4,background:"linear-gradient(90deg,"+col+","+col+"aa)",transition:"width 0.5s"}}/></div>
                  </div>;})}
                </div>
                <div style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:13,padding:14}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#94a3b8",marginBottom:12,letterSpacing:1,textTransform:"uppercase"}}>Puntuacion diaria</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                    {Array.from({length:getDays(habitYear,habitMonth)},(_,d)=>{
                      const s=dScore(d);const bg=s===0?"#1e293b":sColor(s);const isT=(today.getFullYear()===habitYear&&today.getMonth()===habitMonth&&d===today.getDate()-1);
                      return <div key={d} style={{width:38,height:38,borderRadius:7,background:bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",border:isT?"2px solid #f97316":"none",opacity:s===0?0.4:1,boxShadow:s===habits.length?"0 0 12px rgba(16,185,129,0.4)":"none"}}>
                        <div style={{fontSize:9,fontWeight:600,color:s===0?"#475569":"rgba(255,255,255,0.7)"}}>{d+1}</div>
                        {s>0&&<div style={{fontSize:12,fontWeight:900,color:"white"}}>{s}</div>}
                      </div>;
                    })}
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── COMBATES ── */}
        {tab==="combates"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontSize:12,color:"#64748b"}}>{combats.length} combates · {combats.filter(c=>c.result==="victoria").length} victorias · {combats.length?Math.round(combats.filter(c=>c.result==="victoria").length/combats.length*100):0}% tasa</div>
              <button onClick={()=>setShowCombatForm(true)} style={{background:"linear-gradient(135deg,#f59e0b,#d97706)",border:"none",color:"#fff",borderRadius:8,padding:"6px 13px",cursor:"pointer",fontSize:12,fontWeight:600}}>+ Combate</button>
            </div>
            {combats.length>0&&(
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:8,marginBottom:12}}>
                {[{l:"Victorias",v:combats.filter(c=>c.result==="victoria").length,c:"#22c55e"},{l:"Derrotas",v:combats.filter(c=>c.result==="derrota").length,c:"#ef4444"},{l:"% Victoria",v:combats.length?Math.round(combats.filter(c=>c.result==="victoria").length/combats.length*100)+"%":"0%",c:"#f59e0b"},{l:"Gi",v:combats.filter(c=>c.category==="gi").length,c:"#3b82f6"},{l:"No-Gi",v:combats.filter(c=>c.category==="nogi").length,c:"#8b5cf6"}].map((k,i)=>(
                  <div key={i} style={{background:"#0f172a",border:"1px solid "+k.c+"22",borderRadius:10,padding:"10px",textAlign:"center"}}>
                    <div style={{fontSize:18,fontWeight:900,color:k.c}}>{k.v}</div>
                    <div style={{fontSize:10,color:"#64748b",marginTop:2}}>{k.l}</div>
                  </div>
                ))}
              </div>
            )}
            {[...combats].reverse().map(c=>{
              const rCol=c.result==="victoria"?"#22c55e":c.result==="derrota"?"#ef4444":"#94a3b8";
              return <div key={c.id} style={{background:"#0f172a",border:"1px solid "+rCol+"20",borderRadius:11,padding:13,marginBottom:8}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:7,flexWrap:"wrap",gap:7}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:17}}>{c.result==="victoria"?"🏆":c.result==="derrota"?"😤":"🤝"}</span>
                    <div><div style={{fontSize:13,fontWeight:700,color:"#f1f5f9"}}>{c.rival||"Sin nombre"}</div><div style={{fontSize:9,color:"#64748b"}}>{c.date} · {c.category}</div></div>
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <span style={{fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:20,background:c.result==="victoria"?"#052e16":c.result==="derrota"?"#2d0a0a":"#1e293b",color:rCol}}>{c.result.toUpperCase()}</span>
                    <button onClick={()=>{if(!confirm("Eliminar?"))return;const nc=combats.filter(x=>x.id!==c.id);setCombats(nc);S(checked,plans,activePlanId,habitsData,habits,energyLog,nc);}} style={{background:"#2d0a0a",border:"none",color:"#f87171",width:24,height:24,borderRadius:5,cursor:"pointer",fontSize:10}}>X</button>
                  </div>
                </div>
                {c.techniques&&<div style={{fontSize:11,color:"#64748b",marginBottom:3}}><span style={{color:"#475569"}}>Tecnicas: </span>{c.techniques}</div>}
                {c.notes&&<div style={{fontSize:11,color:"#94a3b8",lineHeight:1.5}}>{c.notes}</div>}
              </div>;
            })}
            {combats.length===0&&<div style={{textAlign:"center",padding:"40px",color:"#475569"}}><div style={{fontSize:30,marginBottom:10}}>🏆</div><div>Sin combates registrados</div></div>}
          </div>
        )}

        {/* ── NUTRICION ── */}
        {tab==="nutri"&&(
          <div>
            <div style={{marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:36,height:36,background:"linear-gradient(135deg,#16a34a,#15803d)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🥗</div>
              <div><div style={{fontSize:13,fontWeight:700,color:"#f1f5f9"}}>Nutricionista IA Personal</div><div style={{fontSize:11,color:"#64748b"}}>Recomendaciones personalizadas para BJJ</div></div>
            </div>
            <ChatPanel msgs={nutriMsgs} input={nutriIn} setInput={setNutriIn} onSend={sendNutri} loading={nutriLoad} endRef={nutriRef}
              sugs={["¿Que como antes de BJJ?","Receta alta en proteina","¿Como bajo 1kg?","Snacks entre combates","Cena de recuperacion"]}
              placeholder="Pregunta al nutricionista..." color="#22c55e" label="🥗 NUTRICIONISTA"/>
          </div>
        )}

        {/* ── COACH IA ── */}
        {tab==="coach"&&(
          <div>
            <div style={{marginBottom:12,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <div style={{width:36,height:36,background:"linear-gradient(135deg,#7c3aed,#4f46e5)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🤖</div>
              <div><div style={{fontSize:13,fontWeight:700,color:"#f1f5f9"}}>Entrenador IA Personal</div><div style={{fontSize:11,color:"#64748b"}}>BJJ · Habitos · Nutricion · Mental</div></div>
              <div style={{marginLeft:"auto",background:"#052e16",border:"1px solid #22c55e30",borderRadius:9,padding:"4px 10px",fontSize:11,color:"#22c55e"}}>{totP}% BJJ · {overallPct()}% Habitos</div>
            </div>
            <ChatPanel msgs={coachMsgs} input={coachIn} setInput={setCoachIn} onSend={sendCoach} loading={coachLoad} endRef={coachRef}
              sugs={["¿Como mejoro el cardio?","Analiza mi progreso","Game plan norte-sur","Gestion de nervios","¿Como bajo el peso?"]}
              placeholder="Pregunta a tu entrenador..." color="#7c3aed" label="🤖 ENTRENADOR"/>
          </div>
        )}

      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
try{root.render(<App/>);}
catch(e){
  document.getElementById("error").style.display="block";
  document.getElementById("error").textContent="RENDER ERROR: "+e.message+"\n"+e.stack;
}
</script>
</body>
</html>
