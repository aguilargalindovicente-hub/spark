<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SPARK">
<meta name="theme-color" content="#0a0a0f">
<title>SPARK — Ideas & Notas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --surface:#13131c; --surface2:#1c1c2e;
  --border:rgba(255,255,255,0.08); --accent:#f0b429; --accent2:#ff6b6b;
  --accent3:#4ecdc4; --accent4:#a78bfa; --text:#f0f0f8;
  --muted:rgba(240,240,248,0.4);
  --idea:#f0b429; --nota:#4ecdc4; --tarea:#ff6b6b; --reflexion:#a78bfa;
  --r:18px; --sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:15px;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;
  max-width:430px;margin:0 auto;position:relative;overflow:hidden}

/* HEADER */
header{padding:20px 20px 0;flex-shrink:0;position:relative;z-index:10}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;letter-spacing:-1px}
.logo span{color:var(--accent)}
.note-count{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-family:'Syne',sans-serif}
.search-bar{display:flex;align-items:center;gap:10px;background:var(--surface);
  border:1px solid var(--border);border-radius:14px;padding:10px 16px;margin-bottom:14px}
.search-bar input{background:none;border:none;outline:none;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:14px;width:100%}
.search-bar input::placeholder{color:var(--muted)}
.filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:14px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:6px 14px;border-radius:100px;background:var(--surface);
  border:1px solid var(--border);color:var(--muted);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#0a0a0f;font-weight:700}
.filter-btn.fi.active{background:var(--idea);border-color:var(--idea);color:#0a0a0f}
.filter-btn.fn.active{background:var(--nota);border-color:var(--nota);color:#0a0a0f}
.filter-btn.ft.active{background:var(--tarea);border-color:var(--tarea);color:#0a0a0f}
.filter-btn.fr.active{background:var(--reflexion);border-color:var(--reflexion);color:#0a0a0f}

/* NOTES LIST */
#notes-list{flex:1;overflow-y:auto;padding:0 16px 8px;scrollbar-width:none}
#notes-list::-webkit-scrollbar{display:none}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:55vh;gap:12px;text-align:center;opacity:0.4}
.empty-state p{font-size:14px;color:var(--muted);max-width:200px;line-height:1.6}

/* CARD */
.note-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:16px;margin-bottom:10px;position:relative;overflow:hidden}
.note-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.note-card.idea::before{background:var(--idea)}
.note-card.nota::before{background:var(--nota)}
.note-card.tarea::before{background:var(--tarea)}
.note-card.reflexion::before{background:var(--reflexion)}
.note-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.note-tag{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:3px 8px;border-radius:100px;font-family:'Syne',sans-serif}
.ti{background:rgba(240,180,41,.15);color:var(--idea)}
.tn{background:rgba(78,205,196,.15);color:var(--nota)}
.tt{background:rgba(255,107,107,.15);color:var(--tarea)}
.tr{background:rgba(167,139,250,.15);color:var(--reflexion)}
.note-date{font-size:11px;color:var(--muted)}
.note-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:5px;
  line-height:1.3;cursor:pointer;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.note-preview{font-size:13px;color:var(--muted);line-height:1.5;cursor:pointer;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.note-footer{display:flex;gap:8px;margin-top:12px}
.nact{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
  padding:8px;border-radius:10px;background:var(--surface2);border:none;cursor:pointer;
  font-size:12px;font-weight:500;color:var(--muted);font-family:'DM Sans',sans-serif;transition:opacity .2s}
.nact:active{opacity:0.6}
.nact.wa{color:#25d366}.nact.mail{color:var(--accent4)}.nact.del{color:var(--accent2)}

/* BOTTOM */
.bottom-bar{flex-shrink:0;padding:12px 16px;padding-bottom:calc(12px + var(--sb));
  background:linear-gradient(0deg,var(--bg) 60%,transparent 100%);display:flex;gap:10px}
.btn-record{flex:0 0 64px;height:64px;border-radius:50%;background:var(--accent);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(240,180,41,0.3);transition:all .2s;position:relative}
.btn-record.recording{background:var(--accent2);animation:pulseRec 1s ease-in-out infinite}
.btn-record:disabled{opacity:0.35;pointer-events:none}
@keyframes pulseRec{0%,100%{box-shadow:0 0 0 0 rgba(255,107,107,0.5)}50%{box-shadow:0 0 0 14px rgba(255,107,107,0)}}
.btn-new{flex:1;height:64px;border-radius:18px;background:var(--surface);border:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);transition:opacity .2s}
.btn-new:active{opacity:0.7}

/* RECORDING OVERLAY */
#rec-overlay{position:absolute;inset:0;background:var(--bg);z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;padding:32px;opacity:0;pointer-events:none;transition:opacity .3s}
#rec-overlay.show{opacity:1;pointer-events:all}
.waveform{display:flex;align-items:center;gap:4px;height:56px}
.wb{width:4px;border-radius:4px;background:var(--accent2);animation:wav 0.8s ease-in-out infinite}
.wb:nth-child(1){animation-delay:0s;height:18px}
.wb:nth-child(2){animation-delay:.1s;height:32px}
.wb:nth-child(3){animation-delay:.2s;height:48px}
.wb:nth-child(4){animation-delay:.3s;height:38px}
.wb:nth-child(5){animation-delay:.4s;height:52px}
.wb:nth-child(6){animation-delay:.5s;height:28px}
.wb:nth-child(7){animation-delay:.6s;height:42px}
.wb:nth-child(8){animation-delay:.7s;height:18px}
@keyframes wav{0%,100%{transform:scaleY(.3);opacity:.4}50%{transform:scaleY(1);opacity:1}}
.rec-status{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;text-align:center}
.rec-transcript{font-size:14px;color:var(--muted);text-align:center;line-height:1.6;
  min-height:80px;max-height:150px;overflow-y:auto;background:var(--surface);
  border-radius:var(--r);padding:16px;width:100%;border:1px solid var(--border)}
.btn-stop{width:72px;height:72px;border-radius:50%;background:var(--accent2);border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 28px rgba(255,107,107,0.4);animation:pulseRec 1s ease-in-out infinite}
.btn-cancel{font-size:14px;color:var(--muted);background:none;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;padding:8px 20px}

/* MODAL */
#note-modal{position:absolute;inset:0;background:var(--bg);z-index:90;
  display:flex;flex-direction:column;transform:translateY(100%);
  transition:transform .3s cubic-bezier(.32,.72,0,1)}
#note-modal.show{transform:translateY(0)}
.modal-header{padding:20px 20px 10px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.btn-back{width:40px;height:40px;border-radius:12px;background:var(--surface);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer}
.modal-ttl{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;flex:1}
.btn-save{padding:8px 18px;border-radius:12px;background:var(--accent);border:none;
  font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#0a0a0f;cursor:pointer}
.modal-body{flex:1;overflow-y:auto;padding:0 20px 20px;display:flex;flex-direction:column;gap:14px}
.flabel{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:6px;font-family:'Syne',sans-serif}
.finput{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:14px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .2s}
.finput:focus{border-color:var(--accent)}
textarea.finput{min-height:150px;resize:none;line-height:1.6}
.tag-sel{display:flex;gap:8px;flex-wrap:wrap}
.topt{padding:8px 14px;border-radius:100px;background:var(--surface);border:1px solid var(--border);
  cursor:pointer;transition:all .2s;font-size:13px;font-weight:600;color:var(--muted);font-family:'Syne',sans-serif}
.topt.sel{border-width:2px;font-weight:700}
.topt.idea{color:var(--idea)}.topt.nota{color:var(--nota)}.topt.tarea{color:var(--tarea)}.topt.reflexion{color:var(--reflexion)}
.topt.idea.sel{background:rgba(240,180,41,.15);border-color:var(--idea)}
.topt.nota.sel{background:rgba(78,205,196,.15);border-color:var(--nota)}
.topt.tarea.sel{background:rgba(255,107,107,.15);border-color:var(--tarea)}
.topt.reflexion.sel{background:rgba(167,139,250,.15);border-color:var(--reflexion)}
.mactions{display:flex;gap:10px;margin-top:4px}
.mact{flex:1;padding:14px;border-radius:14px;background:var(--surface);border:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text);transition:opacity .2s}
.mact:active{opacity:0.7}
.mact.wa{color:#25d366;border-color:rgba(37,211,102,.2);background:rgba(37,211,102,.06)}
.mact.mail{color:var(--accent4);border-color:rgba(167,139,250,.2);background:rgba(167,139,250,.06)}

/* TOAST */
#toast{position:absolute;bottom:110px;left:50%;transform:translateX(-50%) translateY(16px);
  background:#1c1c2e;border:1px solid var(--border);border-radius:100px;
  padding:11px 22px;font-size:13px;white-space:nowrap;opacity:0;transition:all .3s;
  z-index:300;pointer-events:none;max-width:90%;text-align:center;white-space:normal}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal-body::-webkit-scrollbar{width:3px}
.modal-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="header-top">
      <div class="logo">SPARK<span>.</span></div>
      <div class="note-count" id="nc">0 NOTAS</div>
    </div>
    <div class="search-bar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" opacity=".4">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search" type="text" placeholder="Buscar ideas...">
    </div>
    <div class="filters">
      <button class="filter-btn active" data-f="all">Todas</button>
      <button class="filter-btn fi" data-f="idea">💡 Ideas</button>
      <button class="filter-btn fn" data-f="nota">📝 Notas</button>
      <button class="filter-btn ft" data-f="tarea">✅ Tareas</button>
      <button class="filter-btn fr" data-f="reflexion">🧠 Reflexiones</button>
    </div>
  </header>

  <div id="notes-list">
    <div class="empty-state" id="empty">
      <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity=".5">
        <path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
      <p>Pulsa el micrófono o "+" para empezar</p>
    </div>
  </div>

  <div class="bottom-bar">
    <button class="btn-record" id="btn-record">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="12" y1="19" x2="12" y2="23" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="8"  y1="23" x2="16" y2="23" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="btn-new" id="btn-new">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Nueva nota
    </button>
  </div>

  <!-- RECORDING OVERLAY -->
  <div id="rec-overlay">
    <div class="waveform">
      <div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div>
      <div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div>
    </div>
    <div class="rec-status" id="rec-status">Solicitando micrófono…</div>
    <div class="rec-transcript" id="rec-transcript">Habla ahora…</div>
    <button class="btn-stop" id="btn-stop">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
        <rect x="6" y="6" width="12" height="12" rx="2"/>
      </svg>
    </button>
    <button class="btn-cancel" id="btn-cancel">Cancelar</button>
  </div>

  <!-- NOTE MODAL -->
  <div id="note-modal">
    <div class="modal-header">
      <button class="btn-back" id="btn-back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <div class="modal-ttl" id="modal-ttl">Nueva nota</div>
      <button class="btn-save" id="btn-save">Guardar</button>
    </div>
    <div class="modal-body">
      <div>
        <div class="flabel">Tipo</div>
        <div class="tag-sel" id="tag-sel">
          <button class="topt idea sel" data-t="idea">💡 Idea</button>
          <button class="topt nota"     data-t="nota">📝 Nota</button>
          <button class="topt tarea"    data-t="tarea">✅ Tarea</button>
          <button class="topt reflexion" data-t="reflexion">🧠 Reflexión</button>
        </div>
      </div>
      <div>
        <div class="flabel">Título</div>
        <input type="text" class="finput" id="m-title" placeholder="Título breve…">
      </div>
      <div>
        <div class="flabel">Contenido</div>
        <textarea class="finput" id="m-content" placeholder="Escribe o dicta tu idea…"></textarea>
      </div>
      <div class="mactions">
        <button class="mact wa"   id="m-wa">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 2C6.477 2 2 6.477 2 12c0 1.821.487 3.53 1.338 5.01L2.007 22l5.068-1.332A9.948 9.948 0 0 0 12 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm0 18c-1.658 0-3.21-.44-4.545-1.207l-.325-.194-3.01.79.806-2.942-.212-.339A7.96 7.96 0 0 1 4 12c0-4.411 3.589-8 8-8s8 3.589 8 8-3.589 8-8 8z"/></svg>
          WhatsApp
        </button>
        <button class="mact mail" id="m-mail">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Email
        </button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script>
// ── STORAGE ──────────────────────────────────
const KEY = 'spark_v2';
const loadNotes = () => { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } };
const saveNotes = () => localStorage.setItem(KEY, JSON.stringify(notes));

let notes = loadNotes();
let editId = null, curFilter = 'all', q = '', selTag = 'idea';

// ── HELPERS ───────────────────────────────────
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const tagLabel = t => ({idea:'💡 Idea',nota:'📝 Nota',tarea:'✅ Tarea',reflexion:'🧠 Reflexión'})[t]||t;
const tagClass = t => ({idea:'ti',nota:'tn',tarea:'tt',reflexion:'tr'})[t]||'ti';

function fmtDate(ts) {
  const d = new Date(ts), now = new Date(), diff = now - d;
  if (diff < 60000) return 'ahora';
  if (diff < 3600000) return `hace ${Math.floor(diff/60000)} min`;
  if (diff < 86400000) return `hace ${Math.floor(diff/3600000)}h`;
  return d.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
}

// ── RENDER ────────────────────────────────────
function render() {
  const list = $('notes-list');
  $('nc').textContent = `${notes.length} ${notes.length===1?'NOTA':'NOTAS'}`;
  list.querySelectorAll('.note-card').forEach(e => e.remove());

  const filtered = notes
    .filter(n => curFilter==='all' || n.tag===curFilter)
    .filter(n => !q || (n.title+' '+n.content).toLowerCase().includes(q.toLowerCase()))
    .sort((a,b) => b.ts - a.ts);

  $('empty').style.display = filtered.length ? 'none' : 'flex';

  filtered.forEach(n => {
    const c = document.createElement('div');
    c.className = `note-card ${n.tag}`;
    c.innerHTML = `
      <div class="note-header">
        <span class="note-tag ${tagClass(n.tag)}">${tagLabel(n.tag)}</span>
        <span class="note-date">${fmtDate(n.ts)}</span>
      </div>
      <div class="note-title">${esc(n.title||'Sin título')}</div>
      <div class="note-preview">${esc(n.content||'')}</div>
      <div class="note-footer">
        <button class="nact wa">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 2C6.477 2 2 6.477 2 12c0 1.821.487 3.53 1.338 5.01L2.007 22l5.068-1.332A9.948 9.948 0 0 0 12 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm0 18c-1.658 0-3.21-.44-4.545-1.207l-.325-.194-3.01.79.806-2.942-.212-.339A7.96 7.96 0 0 1 4 12c0-4.411 3.589-8 8-8s8 3.589 8 8-3.589 8-8 8z"/></svg> WA
        </button>
        <button class="nact mail">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg> Email
        </button>
        <button class="nact del">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>`;
    const [btnWA, btnMail, btnDel] = c.querySelectorAll('.nact');
    c.querySelector('.note-title').onclick = () => openNote(n.id);
    c.querySelector('.note-preview').onclick = () => openNote(n.id);
    btnWA.onclick   = e => { e.stopPropagation(); doShareWA(n); };
    btnMail.onclick = e => { e.stopPropagation(); doShareMail(n); };
    btnDel.onclick  = e => { e.stopPropagation(); deleteNote(n.id); };
    list.appendChild(c);
  });
}

// ── MODAL ─────────────────────────────────────
function openNote(id) { openModal(notes.find(n=>n.id===id)); }
function openModal(n=null) {
  editId = n?.id || null;
  $('modal-ttl').textContent = n ? 'Editar nota' : 'Nueva nota';
  $('m-title').value   = n?.title   || '';
  $('m-content').value = n?.content || '';
  selTag = n?.tag || 'idea';
  refreshTags();
  $('note-modal').classList.add('show');
}
function closeModal() { $('note-modal').classList.remove('show'); editId=null; }
function refreshTags() {
  document.querySelectorAll('.topt').forEach(b=>b.classList.toggle('sel', b.dataset.t===selTag));
}
$('btn-new').onclick  = () => openModal();
$('btn-back').onclick = closeModal;
document.querySelectorAll('.topt').forEach(b=>b.onclick=()=>{ selTag=b.dataset.t; refreshTags(); });

$('btn-save').onclick = () => {
  const title   = $('m-title').value.trim();
  const content = $('m-content').value.trim();
  if (!title && !content) { toast('Escribe algo primero'); return; }
  if (editId) {
    const i = notes.findIndex(n=>n.id===editId);
    if (i!==-1) notes[i] = {...notes[i], title, content, tag:selTag, ts:Date.now()};
  } else {
    notes.unshift({id:Date.now().toString(), title, content, tag:selTag, ts:Date.now()});
  }
  saveNotes(); render(); closeModal(); toast('✓ Guardado');
};

// ── DELETE ────────────────────────────────────
function deleteNote(id) {
  if (!confirm('¿Eliminar esta nota?')) return;
  notes = notes.filter(n=>n.id!==id);
  saveNotes(); render(); toast('Nota eliminada');
}

// ── SHARE ─────────────────────────────────────
function buildText(n) { return `*${n.title||'Nota'}*\n${n.content||''}\n_${tagLabel(n.tag)} · ${new Date(n.ts).toLocaleString('es-ES')}_`; }
function doShareWA(n)   { window.open(`https://wa.me/?text=${encodeURIComponent(buildText(n))}`,'_blank'); }
function doShareMail(n) {
  const s = encodeURIComponent(n.title||'Nota SPARK');
  const b = encodeURIComponent(buildText(n).replace(/\*/g,'').replace(/_/g,''));
  window.location.href = `mailto:?subject=${s}&body=${b}`;
}
$('m-wa').onclick   = () => doShareWA({title:$('m-title').value.trim(), content:$('m-content').value.trim(), tag:selTag, ts:Date.now()});
$('m-mail').onclick = () => doShareMail({title:$('m-title').value.trim(), content:$('m-content').value.trim(), tag:selTag, ts:Date.now()});

// ── FILTERS / SEARCH ──────────────────────────
document.querySelectorAll('.filter-btn').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); curFilter=b.dataset.f; render();
});
$('search').oninput = e => { q=e.target.value; render(); };

// ── SPEECH RECOGNITION ───────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recog = null, isRec = false, fullText = '';

if (!SR) {
  // No support
  $('btn-record').disabled = true;
  $('btn-record').title = 'Tu navegador no soporta reconocimiento de voz';
} else {
  recog = new SR();
  recog.lang = 'es-ES';
  recog.continuous = true;
  recog.interimResults = true;
  recog.maxAlternatives = 1;

  recog.onstart = () => {
    $('rec-status').textContent = 'Escuchando…';
  };

  recog.onresult = e => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
      else interim += e.results[i][0].transcript;
    }
    fullText += final;
    const display = (fullText + interim).trim();
    $('rec-transcript').textContent = display || 'Habla ahora…';
  };

  recog.onerror = e => {
    console.warn('SR error:', e.error, e);
    if (e.error === 'no-speech') return; // ignorar silencio
    if (e.error === 'aborted') return;   // parada normal
    stopRec(false);
    const msgs = {
      'not-allowed':           '❌ Permiso de micrófono denegado.\nVe a Ajustes del navegador → Permisos del sitio → Micrófono y actívalo.',
      'network':               '❌ Sin conexión. El reconocimiento de voz necesita internet.',
      'service-not-available': '❌ Servicio no disponible. Comprueba tu conexión a internet.',
      'audio-capture':         '❌ No se detecta micrófono.',
      'language-not-supported':'❌ Idioma no soportado.',
    };
    toast(msgs[e.error] || `❌ Error: ${e.error}`);
  };

  recog.onend = () => {
    // Si aún grabando, reiniciar (Chrome para tras silencio)
    if (isRec) {
      try { recog.start(); } catch(err) {
        isRec = false;
        hideOverlay();
      }
    }
  };
}

function hideOverlay() {
  $('rec-overlay').classList.remove('show');
  $('btn-record').classList.remove('recording');
}

async function startRec() {
  if (!recog) { toast('Reconocimiento de voz no disponible en este navegador. Usa Chrome o Safari.'); return; }
  if (isRec) return;

  // Mostrar overlay inmediatamente
  fullText = '';
  $('rec-status').textContent = 'Solicitando micrófono…';
  $('rec-transcript').textContent = 'Habla ahora…';
  $('rec-overlay').classList.add('show');
  $('btn-record').classList.add('recording');

  // Pedir permiso explícito primero
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    // Detener el stream inmediatamente (solo necesitamos el permiso)
    stream.getTracks().forEach(t => t.stop());
  } catch(err) {
    hideOverlay();
    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
      toast('❌ Permiso de micrófono denegado.\nVe a Ajustes del navegador y activa el micrófono para este sitio.');
    } else if (err.name === 'NotFoundError') {
      toast('❌ No se encontró micrófono en este dispositivo.');
    } else {
      toast('❌ No se pudo acceder al micrófono: ' + err.message);
    }
    return;
  }

  // Permiso concedido — iniciar reconocimiento
  isRec = true;
  $('rec-status').textContent = 'Escuchando…';
  try {
    recog.start();
  } catch(err) {
    // Ya estaba corriendo
    if (err.name !== 'InvalidStateError') {
      isRec = false;
      hideOverlay();
      toast('Error al iniciar: ' + err.message);
    }
  }
}

function stopRec(save=true) {
  const wasRec = isRec;
  isRec = false;
  try { recog && recog.stop(); } catch(e){}
  hideOverlay();

  if (save && fullText.trim()) {
    const words = fullText.trim().split(/\s+/);
    const autoTitle = words.slice(0,7).join(' ') + (words.length > 7 ? '…' : '');
    $('m-title').value   = autoTitle;
    $('m-content').value = fullText.trim();
    selTag = 'idea'; refreshTags(); editId = null;
    $('modal-ttl').textContent = 'Nueva nota';
    $('note-modal').classList.add('show');
  } else if (save && wasRec && !fullText.trim()) {
    toast('No se detectó audio. Habla más fuerte o comprueba el micrófono.');
  }
}

$('btn-record').onclick = startRec;
$('btn-stop').onclick   = () => stopRec(true);
$('btn-cancel').onclick = () => stopRec(false);

// ── TOAST ─────────────────────────────────────
let tT;
function toast(msg) {
  const t = $('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(tT);
  tT = setTimeout(()=>t.classList.remove('show'), 4000);
}

// ── INIT ──────────────────────────────────────
render();
</script>
</body>
</html>
